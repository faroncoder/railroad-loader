<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Railroad Loader - Basic Example</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #0d1117;
      color: #e6edf3;
    }
    h1 { color: #58a6ff; }
    button {
      background: #238636;
      color: white;
      border: none;
      padding: 10px 20px;
      margin: 5px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #2ea043; }
    button.secondary { background: #1f6feb; }
    button.secondary:hover { background: #388bfd; }
    .section {
      margin: 30px 0;
      padding: 20px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
    }
    h2 { margin-top: 0; }
    code {
      background: #0d1117;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 13px;
      color: #f78166;
    }
  </style>
</head>
<body>
  <h1>🚂 Railroad Loader - Examples</h1>

  <div class="section">
    <h2>Basic Loader</h2>
    <button onclick="showBasic()">
      Show Loader (3 seconds)
    </button>
    <button class="secondary" onclick="showQuick()">
      Quick Loader (1 second)
    </button>
  </div>

  <div class="section">
    <h2>Custom Messages</h2>
    <button onclick="showBuild()">
      Build Process
    </button>
    <button onclick="showDeploy()">
      Deployment
    </button>
    <button onclick="showFetch()">
      Data Loading
    </button>
  </div>

  <div class="section">
    <h2>Async Operations</h2>
    <button onclick="simulateAsync()">
      Simulate API Call
    </button>
    <button onclick="simulateLongTask()">
      Long Running Task
    </button>
  </div>

  <div class="section">
    <h2>Test Min Duration</h2>
    <p>Loader enforces 500ms minimum display to prevent flash.</p>
    <button onclick="testFlash()">
      Super Fast Load (50ms)
    </button>
    <p><small>Notice loader still stays for 500ms minimum</small></p>
  </div>

  <div class="section">
    <h2>Check State</h2>
    <button class="secondary" onclick="checkState()">
      Is Loading?
    </button>
  </div>

  <!-- Load Railroad Loader from local source -->
  <script src="../src/loader.js"></script>

  <!-- Uncomment to load from CDN instead:
  <script src="https://unpkg.com/railroad-loader@1.0.0/dist/loader.min.js"></script>
  -->

  <script>
    function showBasic() {
      RailroadLoader.show();
      setTimeout(() => {
        RailroadLoader.hide();
      }, 3000);
    }

    function showQuick() {
      RailroadLoader.show();
      setTimeout(() => {
        RailroadLoader.hide();
      }, 1000);
    }

    function showBuild() {
      RailroadLoader.show([
        'Installing dependencies...',
        'Compiling TypeScript...',
        'Bundling modules...',
        'Minifying code...',
        'Build complete!'
      ]);
      setTimeout(() => {
        RailroadLoader.hide();
      }, 4000);
    }

    function showDeploy() {
      RailroadLoader.show([
        'Connecting to server...',
        'Uploading files...',
        'Running migrations...',
        'Restarting services...',
        'Deployment successful!'
      ]);
      setTimeout(() => {
        RailroadLoader.hide();
      }, 5000);
    }

    function showFetch() {
      RailroadLoader.show([
        'Fetching user data...',
        'Loading preferences...',
        'Building dashboard...',
        'Ready!'
      ]);
      setTimeout(() => {
        RailroadLoader.hide();
      }, 3000);
    }

    async function simulateAsync() {
      RailroadLoader.show(['Fetching data from API...']);
      
      // Simulate API call
      await new Promise(resolve => setTimeout(resolve, 2500));
      
      RailroadLoader.hide();
      alert('Data loaded successfully!');
    }

    async function simulateLongTask() {
      RailroadLoader.show([
        'Processing large dataset...',
        'Analyzing patterns...',
        'Generating report...',
        'Almost done...'
      ]);
      
      // Simulate long task
      await new Promise(resolve => setTimeout(resolve, 6000));
      
      RailroadLoader.hide();
      alert('Task completed!');
    }

    async function testFlash() {
      RailroadLoader.show(['Super fast operation...']);
      
      // Complete in just 50ms
      await new Promise(resolve => setTimeout(resolve, 50));
      
      // But loader stays for 500ms minimum
      RailroadLoader.hide();
    }

    function checkState() {
      if (RailroadLoader.isLoading()) {
        alert('Yes, loader is currently showing');
      } else {
        alert('No, loader is not showing');
      }
    }
  </script>
</body>
</html>
